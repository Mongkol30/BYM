name: Backend CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # CI: แค่ตรวจ compile ผ่านไหม (ไม่ต้อง build JAR จริง)
  # Render จะ build Docker image เองอยู่แล้ว
  # ─────────────────────────────────────────
  ci:
    name: Compile Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compile (fast check)
        run: mvn compile -q

  # ─────────────────────────────────────────
  # CD: Trigger Render ให้ build Docker image และ deploy
  # เฉพาะ push to main เท่านั้น
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"