name: Backend CI/CD → Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # CI: ทดสอบและ build JAR
  # ─────────────────────────────────────────
  ci:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

#      - name: Run tests
#        run: mvn test
#        env:
          # Supabase connection สำหรับ test (ใช้ test DB แยกถ้ามี)
#          SPRING_DATASOURCE_URL: ${{ secrets.TEST_DB_URL }}
#          SPRING_DATASOURCE_USERNAME: ${{ secrets.TEST_DB_USERNAME }}
#          SPRING_DATASOURCE_PASSWORD: ${{ secrets.TEST_DB_PASSWORD }}

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────
  # CD: Deploy ไป Render (เฉพาะ push to main)
  # Render จะ pull จาก GitHub และ deploy ใหม่อัตโนมัติ
  # เราแค่ trigger deploy hook ของ Render
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP Status: %{http_code}\n"